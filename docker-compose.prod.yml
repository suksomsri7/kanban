# Production overrides สำหรับ VPS
# ใช้: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    ports:
      - "127.0.0.1:5432:5432"   # ไม่ expose ไปภายนอก (เฉพาะ localhost)

  soketi:
    ports:
      - "6001:6001"             # Browser ต้องเชื่อมต่อได้

  app:
    env_file:
      - .env
    environment:
      NODE_ENV: production
